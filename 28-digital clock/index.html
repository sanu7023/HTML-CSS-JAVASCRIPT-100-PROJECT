<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="body_container">

    <div class="digital_container">
        <h1>Digital Clock</h1>
        <div class="digital_box">
            <div class="box" >
                <h2 id="hour">0</h2>
                <p>Hour</p>
            </div>
            <div class="box">
                <h2 id="minute">0</h2>
                <p>Minute</p>
            </div>
            <div class="box">
                <h2 id="second">0</h2>
                <p>Second</p>
            </div>
            <div class="box">
                <h2 id="millisecond">0</h2>
                <p>Millisecond</p>
            </div>
            <div class="box">
                <h2 id="ampm">11</h2>
                <p>AM / PM</p>
            </div>
        </div>
    </div>


    <script src="script.js"></script>
</body>

</html>
